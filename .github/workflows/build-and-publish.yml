name: Build and Publish to Modrinth

on:
  push:
    branches: [ main ]

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build
        run: ./gradlew build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: mod-jar
          path: build/libs/*.jar
          if-no-files-found: error

      - name: Publish to Modrinth
        run: ./gradlew modrinth
        env:
          MODRINTH_API_TOKEN: ${{ secrets.MODRINTH_API_TOKEN }}

      - name: Bump modpack manifest for cafe-table
        uses: actions/checkout@v4
        with:
          repository: brooswit/minecraft-modpack
          path: minecraft-modpack
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update cafe-table version in modpack manifest
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          cd minecraft-modpack
          if [ -f manifest.json ]; then
            python3 - <<EOF
          import json, sys
          with open('manifest.json', 'r') as f:
              manifest = json.load(f)
          for file in manifest.get('files', []):
              if file.get('slug') == 'cafe-table' or file.get('projectID') == 'cafe-table':
                  file['version'] = '$MOD_VERSION'
          with open('manifest.json', 'w') as f:
              json.dump(manifest, f, indent=2)
          print('Updated cafe-table version to $MOD_VERSION')
          EOF
          elif [ -f mods.txt ]; then
            sed -i "s/cafe.table:[^[:space:]]*/cafe-table:$MOD_VERSION/" mods.txt
            echo "Updated cafe-table version to $MOD_VERSION in mods.txt"
          else
            echo "No manifest file found — skipping modpack update"
          fi

      - name: Commit and push modpack update
        run: |
          MOD_VERSION=$(grep '^mod_version=' gradle.properties | cut -d= -f2)
          cd minecraft-modpack
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: bump cafe-table to $MOD_VERSION"
          git push
